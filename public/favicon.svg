<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background — dark navy, rounded app icon shape -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>

  <!-- Suit / shoulders -->
  <path d="M2 68 C2 52 12 47 22 47 L26 51 L32 55 L38 51 L42 47 C52 47 62 52 62 68 Z" fill="#1e3564"/>

  <!-- Shirt white -->
  <polygon points="27,51 32,57 37,51 34,53 32,55 30,53" fill="#dde3f0"/>

  <!-- Neck -->
  <rect x="27" y="42" width="10" height="7" rx="2" fill="#8b5e3c"/>

  <!-- Head / face -->
  <ellipse cx="32" cy="27" rx="14.5" ry="16" fill="#8b5e3c"/>

  <!-- Hair — top and sides -->
  <path d="M17.5 23 Q17 9 32 8 Q47 9 46.5 23 Q46 13 32 13 Q18 13 17.5 23 Z" fill="#140b05"/>
  <path d="M17.5 23 Q16 27 17 30 Q17 24 17.5 23 Z" fill="#140b05"/>
  <path d="M46.5 23 Q48 27 47 30 Q47 24 46.5 23 Z" fill="#140b05"/>

  <!-- Beard -->
  <path d="M18 37 Q18 46 32 49 Q46 46 46 37 Q41 41 32 42 Q23 41 18 37 Z" fill="#140b05" opacity="0.8"/>

  <!-- Eyebrows -->
  <path d="M22.5 22.5 Q26 20.5 29.5 22" stroke="#140b05" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M34.5 22 Q38 20.5 41.5 22.5" stroke="#140b05" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="26" cy="27" rx="2.8" ry="2.5" fill="#140b05"/>
  <ellipse cx="38" cy="27" rx="2.8" ry="2.5" fill="#140b05"/>
  <!-- Eye shine -->
  <circle cx="27" cy="26" r="0.9" fill="white" opacity="0.55"/>
  <circle cx="39" cy="26" r="0.9" fill="white" opacity="0.55"/>

  <!-- Nose -->
  <path d="M30 33 Q32 36.5 34 33" stroke="#6b4528" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <circle cx="29.5" cy="34" r="1" fill="#6b4528" opacity="0.35"/>
  <circle cx="34.5" cy="34" r="1" fill="#6b4528" opacity="0.35"/>

  <!-- Mouth — subtle smile under beard starts -->
  <path d="M27 39.5 Q32 43 37 39.5" stroke="#5a3018" stroke-width="1.4" fill="none" stroke-linecap="round"/>
</svg>
